<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SiriFlix</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1 class="logo">SiriFlix</h1>
        
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar modo claro/escuro"></button>
    </header>

    <main>
        <h2>Quem está assistindo?</h2>
        <section class="profiles" aria-label="Perfis de usuário">
            <a href="./catalogo.html" class="profile" data-user="Iris">
                <figure>
                    <img src="./assets/goku1.jpeg" 
                         alt="Esta é Chi-Chi, a esposa de Goku da popular série de anime Dragon Ball, assistindo TV em sua sala de estar.">
                    <figcaption>Iris</figcaption>
                </figure>
            </a>

            <a href="./catalogo.html" class="profile" data-user="Thiago">
                <figure>
                    <img src="./assets/goku2.jpeg"  
                         alt="Esse é Goku e ele está assistindo TV em sua sala de estar, usando um pijama listrado e com uma expressão de concentração no rosto.">
                    <figcaption>Thiago</figcaption>
                </figure> 
            </a> 

            <a href="./catalogo.html" class="profile" data-user="Dorotéia">
                <figure>
                    <img src="./assets/goku3.jpeg" 
                         alt="Um gato calico muito fofo assistindo TV.">
                    <figcaption>Dorotéia</figcaption>
                </figure> 
            </a> 

            <a href="./catalogo.html" class="profile" data-user="Lucas"> 
                <figure> 
                    <img src="./assets/goku4.jpeg" 
                         alt="Esta imagem captura uma cena nostálgica onde Gohan, em sua fase adulta, assiste a uma batalha épica entre Freeza e Vegeta na televisão, acompanhado por um gato calico. ">
                    <figcaption>Lucas</figcaption> 
                </figure> 
            </a> 

        </section>
    </main> 

    <footer> 
        <p>© 2026 Netflix Clone - Projeto de Estudo</p> 
    </footer> 

    <script type="module" src="./index.js"></script> 
</body> 

</html>
